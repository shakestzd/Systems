name: Build check

# This workflow verifies notebooks export cleanly in CI.
# It does NOT deploy -- deployment is done locally via scripts/deploy.sh,
# which builds from the full local database and pushes to the gh-pages branch.

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Cache research database
        uses: actions/cache@v4
        with:
          path: data/research.duckdb
          key: research-db-${{ hashFiles('src/data/pipelines.py') }}
          restore-keys: research-db-

      - name: Build site
        run: uv run python .github/scripts/build.py
